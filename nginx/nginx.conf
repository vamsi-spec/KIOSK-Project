events {
    worker_connections 1024;
}

http {

    # Rate limiting zones — defined once, used per location
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/s;

    # Upstream service definitions
    upstream auth_service  { server auth-service:3001;  }
    upstream core_service  { server core-service:3002;  }
    upstream admin_service { server admin-service:3003; }

    server {
        listen 80;
        server_name _;

        # ── Serve React kiosk frontend (static build) ──
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            # SPA fallback — routes like /home, /pay handled by React Router
            try_files $uri $uri/ /index.html;
        }

        # ── Auth Service — with strict rate limiting ──
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://auth_service/auth/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Kiosk-ID        $http_x_kiosk_id;
        }

        # ── Core Service — standard rate limiting ──
        location /api/core/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://core_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Kiosk-ID        $http_x_kiosk_id;

            # Allow larger body for file uploads (Phase 10)
            client_max_body_size 6M;
        }

        # ── Admin Service ──
        location /api/admin/ {
            proxy_pass         http://admin_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Socket.io WebSocket upgrade (Phase 11) ──
        location /socket.io/ {
            proxy_pass         http://core_service;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
