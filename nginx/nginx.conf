events {
    worker_connections 1024;
}

http {

    # Rate limiting zones — defined once, used per location
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/s;

    # Docker DNS for runtime service discovery
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        # ── Serve React kiosk frontend (static build) ──
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            # SPA fallback — routes like /home, /pay handled by React Router
            try_files $uri $uri/ /index.html;
        }

        # ── Auth Service — with strict rate limiting ──
        location /api/auth/ {
            set $auth_upstream auth-service:3001;

            rewrite ^/api/auth/(.*)$ /auth/$1 break;

            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://$auth_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Kiosk-ID        $http_x_kiosk_id;
        }

        # ── Core Service — standard rate limiting ──
        location /api/core/ {
            set $core_upstream core-service:3002;

            rewrite ^/api/core/(.*)$ /$1 break;

            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://$core_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Kiosk-ID        $http_x_kiosk_id;

            # Allow larger body for file uploads (Phase 10)
            client_max_body_size 6M;
        }

        # ── Admin Service ──
        location /api/admin/ {
            set $admin_upstream admin-service:3003;

            rewrite ^/api/admin/(.*)$ /$1 break;

            proxy_pass         http://$admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Socket.io WebSocket upgrade (Phase 11) ──
        location /socket.io/ {
            set $core_ws_upstream core-service:3002;

            proxy_pass         http://$core_ws_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
